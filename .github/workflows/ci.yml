name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: my-devops-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: my-devops-app:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true
          vuln-type: 'os,library'

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    # Deploy on pushes to main or manual runs — never on pull requests.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Redeploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/app
            sudo git fetch --depth 1 origin main
            sudo git reset --hard origin/main
            sudo docker build -t my-devops-app:latest .
            sudo docker rm -f my-devops-app 2>/dev/null || true
            sudo docker run -d --name my-devops-app --restart=always \
              -p 3000:3000 my-devops-app:latest
            sudo docker image prune -f
            echo "Waiting for health check..."
            for i in $(seq 1 10); do
              if curl -fsS http://localhost:3000/health; then
                echo "\nDeploy healthy."; exit 0
              fi
              sleep 3
            done
            echo "Health check failed after deploy" >&2; exit 1
